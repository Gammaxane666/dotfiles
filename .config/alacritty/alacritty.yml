import:
    - ~/.config/alacritty/themes/Gruvbox_dark.yml

env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 85
    lines: 25
  padding:
    x: 6
    y: 0
  decorations: none
  opacity: 1.00

scrolling:
  history: 1000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  size: 10.0

  draw_bold_text_with_bright_colors: true

cursor:
  style:
    shape: Block
live_config_reload: true

  # shell:
  #   program: /bin/fish
  #   args:
  #       - -l
  #       - -c
  #       - "tmux -u attach || tmux "
